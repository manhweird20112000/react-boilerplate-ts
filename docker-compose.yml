services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.w3rd.com/api/}
        VITE_APP_NAME: ${VITE_APP_NAME:-W3RD Codebase}
        VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
        VITE_USE_MSW: ${VITE_USE_MSW:-false}
    image: w3rd-codebase:latest
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
